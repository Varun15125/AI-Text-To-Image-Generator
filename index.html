<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2art AI</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
<body>
<h1>Ai Image Generator</h1>
<div class="search-box">
    <input type="text" id="prompt" placeholder="Enter your prompt here...">
    <button onclick="generateImage()"><i class="fa-solid fa-arrow-right"></i></button>
</div>
<div class="result-container" id="result">
    <!-- <div class="loading-text">Generating image...</div> -->
     <div class="image-wrapper" id="image-container">
        <div class="icon-btns">
            <button onclick="downloadImage()"><i class="fa-solid fa-download"></i></button>
            <button onclick="deleteImage()"><i class="fa-solid fa-trash"></i></button>
        </div>
            <img id="generated-image" src="" alt="">
     </div>
     <div>
        <footer id="foot">
            <p>&copy; 2026 Ai Image Generator. All rights reserved. created by varun londhe </p>
        </footer>
     </div>
</div>
<script src="app.js"></script>
</body>
</html>
